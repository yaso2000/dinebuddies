<body style="margin: 0; padding: 0; overscroll-behavior-y: none;">
  <div id="root"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Production Cleanup: Force unregister old Service Workers and clear caches
    console.log('🚀 DineBuddies: Initializing Clean Mode...');
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        if (regs.length > 0) {
          console.log(`🧹 Unregistering ${regs.length} Service Workers...`);
          regs.forEach(r => r.unregister());
        }
      });
    }
    if (window.caches) {
      caches.keys().then(keys => {
        if (keys.length > 0) {
          console.log(`🗑️ Clearing ${keys.length} Caches...`);
          keys.forEach(k => caches.delete(k));
        }
      });
    }
  </script>
</body>
